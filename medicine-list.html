<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Medicine List</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:80%;
    margin:40px auto;
    text-align:center;
}

h2{
    color:#2c3e50;
    margin-bottom:20px;
}

.add-btn{
    background-color:#28a745;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:5px;
    font-size:16px;
}

.add-btn:hover{
    background-color:#218838;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

th{
    background:#4a90e2;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f2f2f2;
}

.delete-btn{
    background:#dc3545;
    color:white;
    padding:6px 12px;
    text-decoration:none;
    border-radius:4px;
}

.delete-btn:hover{
    background:#c82333;
}
</style>

</head>
<body>

<div class="container">

    <h2>Medicine List</h2>
    <div style="text-align:center; margin-bottom:10px;">
    <input type="text" id="searchInput"
           placeholder="Search Medicine"
           style="padding:8px; width:250px;">
</div>
<table id="medicineTable">
         <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Action</th>
        </tr>

        <tr th:each="m : ${medicines}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.medicineName}"></td>
            <td th:text="${m.quantity}"></td>
            <td th:text="${m.price}"></td>
            <td>
                <a th:href="@{/medicine/delete/{id}(id=${m.id})}"
                   class="delete-btn">
                   Delete
                </a>
            </td>
        </tr>

    </table>
    <a href="/medicine" class="add-btn">
    Add New Medicine
</a>

</div>
<script>
document.getElementById("searchInput").addEventListener("keyup", function() {

    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#medicineTable tr");

    rows.forEach(function(row, index) {

        if(index === 0) return;

        let text = row.innerText.toLowerCase();

        row.style.display = text.includes(filter) ? "" : "none";
    });
});
</script>

</body>
</html>

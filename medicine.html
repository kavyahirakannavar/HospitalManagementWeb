<!DOCTYPE html>
<html>
<head>
<title>Medicine Details</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#74ebd5,#9face6);
    margin:0;
    padding:0;
}

.container{
    width:400px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#2c3e50;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2980b9;
}
</style>

</head>
<body>

<div class="container">
    <h1>💊 Medicine Details</h1>

    <form action="/medicine/save" method="post">

        <label>Medicine Name</label>
        <input type="text" name="medicineName" placeholder="Enter Medicine Name" required>

        <label>Quantity</label>
        <input type="number" name="quantity" placeholder="Enter Quantity" required>

        <label>Price</label>
        <input type="number" step="0.01" name="price" placeholder="Enter Price" required>

        <button type="submit">Save Medicine</button>

    </form>

</div>

</body>
</html>

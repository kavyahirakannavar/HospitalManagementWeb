<!DOCTYPE html>
<html>
<head>
<title>Patient Registration</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#74ebd5,#9face6);
    margin:0;
    padding:0;
}

.container{
    width:400px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#2c3e50;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2980b9;
}
</style>

</head>
<body>

<div class="container">
    <h1>👦 Patient Registration</h1>

    <form action="/patient/register" method="post">

        <label>Patient Name</label>
        <input type="text" name="patientName" placeholder="Enter Patient Name">

        <label>Age</label>
        <input type="number" name="age" placeholder="Enter Age">

        <label>Disease</label>
        <input type="text" name="disease" placeholder="Enter Disease">

        <button type="submit">Register Patient</button>

    </form>

</div>
